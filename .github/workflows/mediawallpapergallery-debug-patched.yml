name: MediaWallpaperGallery Debug Build Patched

on:
  push:
    branches: ["feature/gallery-wallpaper-image-video"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MediaWallpaperGallery

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Patch project for stable build
        run: |
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.jfdedit3.mediawallpapergallery"
              compileSdk = 35
          
              defaultConfig {
                  applicationId = "com.jfdedit3.mediawallpapergallery"
                  minSdk = 24
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
          
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }
          
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          
              kotlinOptions {
                  jvmTarget = "17"
              }
          
              buildFeatures {
                  viewBinding = true
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("androidx.activity:activity-ktx:1.9.2")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("com.github.bumptech.glide:glide:4.16.0")
          }
          EOF

          cat > app/src/main/res/layout/activity_viewer.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
          
              <com.google.android.material.appbar.MaterialToolbar
                  android:id="@+id/toolbar"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  app:navigationIcon="@android:drawable/ic_media_previous"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent" />
          
              <ImageView
                  android:id="@+id/imageView"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:adjustViewBounds="true"
                  android:scaleType="fitCenter"
                  app:layout_constraintBottom_toTopOf="@id/actionRow"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@id/toolbar" />
          
              <VideoView
                  android:id="@+id/playerView"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  app:layout_constraintBottom_toTopOf="@id/actionRow"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@id/toolbar" />
          
              <LinearLayout
                  android:id="@+id/actionRow"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:gravity="center"
                  android:orientation="horizontal"
                  android:padding="12dp"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent">
          
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/shareButton"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="@string/share" />
          
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/wallpaperButton"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginStart="12dp"
                      android:text="@string/set_wallpaper" />
              </LinearLayout>
          
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat > app/src/main/java/com/jfdedit3/mediawallpapergallery/ViewerActivity.kt <<'EOF'
          package com.jfdedit3.mediawallpapergallery
          
          import android.app.WallpaperManager
          import android.content.ComponentName
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.widget.MediaController
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import com.bumptech.glide.Glide
          import com.jfdedit3.mediawallpapergallery.databinding.ActivityViewerBinding
          
          class ViewerActivity : AppCompatActivity() {
          
              private lateinit var binding: ActivityViewerBinding
              private var currentUri: Uri? = null
              private var currentType: MediaType = MediaType.IMAGE
          
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityViewerBinding.inflate(layoutInflater)
                  setContentView(binding.root)
          
                  currentUri = intent.getStringExtra(EXTRA_URI)?.let(Uri::parse)
                  currentType = runCatching { MediaType.valueOf(intent.getStringExtra(EXTRA_TYPE).orEmpty()) }.getOrDefault(MediaType.IMAGE)
          
                  binding.toolbar.title = intent.getStringExtra(EXTRA_NAME).orEmpty()
                  binding.toolbar.setNavigationOnClickListener { finish() }
                  binding.shareButton.setOnClickListener { shareCurrentMedia() }
                  binding.wallpaperButton.setOnClickListener { setCurrentMediaAsWallpaper() }
          
                  val uri = currentUri ?: return
                  if (currentType == MediaType.IMAGE) {
                      binding.imageView.visibility = android.view.View.VISIBLE
                      binding.playerView.visibility = android.view.View.GONE
                      binding.wallpaperButton.text = getString(R.string.set_image_wallpaper)
                      Glide.with(this).load(uri).into(binding.imageView)
                  } else {
                      binding.imageView.visibility = android.view.View.GONE
                      binding.playerView.visibility = android.view.View.VISIBLE
                      binding.wallpaperButton.text = getString(R.string.set_video_wallpaper)
                      binding.playerView.setVideoURI(uri)
                      binding.playerView.setMediaController(MediaController(this))
                      binding.playerView.setOnPreparedListener { mp ->
                          mp.isLooping = true
                          binding.playerView.start()
                      }
                  }
              }
          
              private fun shareCurrentMedia() {
                  val uri = currentUri ?: return
                  val type = if (currentType == MediaType.VIDEO) "video/*" else "image/*"
                  val shareIntent = Intent(Intent.ACTION_SEND).apply {
                      this.type = type
                      putExtra(Intent.EXTRA_STREAM, uri)
                      addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                  }
                  startActivity(Intent.createChooser(shareIntent, getString(R.string.share)))
              }
          
              private fun setCurrentMediaAsWallpaper() {
                  val uri = currentUri ?: return
                  if (currentType == MediaType.IMAGE) {
                      runCatching {
                          contentResolver.openInputStream(uri)?.use { input ->
                              WallpaperManager.getInstance(this).setStream(input)
                          }
                          Toast.makeText(this, getString(R.string.wallpaper_image_success), Toast.LENGTH_SHORT).show()
                      }.onFailure {
                          Toast.makeText(this, getString(R.string.wallpaper_failed), Toast.LENGTH_LONG).show()
                      }
                      return
                  }
          
                  runCatching {
                      VideoWallpaperService.saveVideoUri(this, uri)
                      val component = ComponentName(this, VideoWallpaperService::class.java)
                      startActivity(
                          Intent(WallpaperManager.ACTION_CHANGE_LIVE_WALLPAPER).putExtra(
                              WallpaperManager.EXTRA_LIVE_WALLPAPER_COMPONENT,
                              component
                          )
                      )
                  }.recoverCatching {
                      startActivity(Intent(WallpaperManager.ACTION_LIVE_WALLPAPER_CHOOSER))
                  }.onSuccess {
                      Toast.makeText(this, getString(R.string.wallpaper_video_hint), Toast.LENGTH_LONG).show()
                  }.onFailure {
                      Toast.makeText(this, getString(R.string.wallpaper_failed), Toast.LENGTH_LONG).show()
                  }
              }
          
              override fun onStop() {
                  super.onStop()
                  binding.playerView.stopPlayback()
              }
          
              companion object {
                  const val EXTRA_URI = "extra_uri"
                  const val EXTRA_NAME = "extra_name"
                  const val EXTRA_TYPE = "extra_type"
              }
          }
          EOF

          cat > app/src/main/java/com/jfdedit3/mediawallpapergallery/VideoWallpaperService.kt <<'EOF'
          package com.jfdedit3.mediawallpapergallery
          
          import android.content.Context
          import android.media.MediaPlayer
          import android.net.Uri
          import android.service.wallpaper.WallpaperService
          import android.view.SurfaceHolder
          
          class VideoWallpaperService : WallpaperService() {
          
              override fun onCreateEngine(): Engine = VideoWallpaperEngine()
          
              inner class VideoWallpaperEngine : Engine() {
                  private var mediaPlayer: MediaPlayer? = null
          
                  override fun onSurfaceCreated(holder: SurfaceHolder) {
                      super.onSurfaceCreated(holder)
                      startPlayback(holder)
                  }
          
                  override fun onVisibilityChanged(visible: Boolean) {
                      if (visible) mediaPlayer?.start() else mediaPlayer?.pause()
                  }
          
                  override fun onSurfaceDestroyed(holder: SurfaceHolder) {
                      mediaPlayer?.release()
                      mediaPlayer = null
                      super.onSurfaceDestroyed(holder)
                  }
          
                  override fun onDestroy() {
                      mediaPlayer?.release()
                      mediaPlayer = null
                      super.onDestroy()
                  }
          
                  private fun startPlayback(holder: SurfaceHolder) {
                      val uriString = getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE).getString(KEY_URI, null) ?: return
                      val uri = Uri.parse(uriString)
                      mediaPlayer?.release()
                      mediaPlayer = MediaPlayer().apply {
                          setSurface(holder.surface)
                          isLooping = true
                          setVolume(0f, 0f)
                          setDataSource(this@VideoWallpaperService, uri)
                          setOnPreparedListener { it.start() }
                          prepareAsync()
                      }
                  }
              }
          
              companion object {
                  private const val PREFS_NAME = "video_wallpaper_prefs"
                  private const val KEY_URI = "video_uri"
          
                  fun saveVideoUri(context: Context, uri: Uri) {
                      context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .edit()
                          .putString(KEY_URI, uri.toString())
                          .apply()
                  }
              }
          }
          EOF

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mediawallpapergallery-debug-apk-patched
          path: MediaWallpaperGallery/app/build/outputs/apk/debug/app-debug.apk
